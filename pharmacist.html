<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoseBand — Pharmacist Review Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0a0c0b;--surface:#f5f3ef;--surface2:#eceae4;--surface3:#e2ded6;--card:#fff;--border:#d0ccc4;--border2:#b8b4aa;--muted:#7a7670;--dim:#5a5650;--body:#3a3830;--green:#1a7a4a;--green-bg:#e8f5ee;--green-bd:#b8dfc8;--amber:#b86800;--amber-bg:#fef5e4;--amber-bd:#f0d080;--red:#b82020;--red-bg:#fdecea;--red-bd:#f0b0a8;--blue:#1a4a8a;--blue-bg:#e8eef8;--blue-bd:#a8c0e8;--mono:"JetBrains Mono",monospace;--display:"Syne",sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--surface);color:var(--body);font-family:var(--display);font-size:13px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
.nav{background:var(--ink);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.nav-brand{font-family:var(--display);font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.02em;text-decoration:none}
.nav-links{display:flex;gap:4px}
.nav-link{font-family:var(--mono);font-size:10px;padding:6px 12px;border-radius:5px;color:rgba(255,255,255,0.55);text-decoration:none;letter-spacing:0.06em;transition:all 0.15s;border:1px solid transparent}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.08)}
.nav-link.active{color:#fff;background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.15)}
.shell{display:flex;height:calc(100vh - 56px);overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:14px 16px;border-bottom:1px solid var(--border)}
.sb-title{font-family:var(--display);font-size:13px;font-weight:700;color:var(--ink)}
.sb-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.prog-wrap{padding:10px 14px 0;display:flex;align-items:center;gap:8px;flex-shrink:0}
.prog-label{font-family:var(--mono);font-size:9px;color:var(--muted);white-space:nowrap;letter-spacing:0.06em;text-transform:uppercase}
.prog-outer{flex:1;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.prog-inner{height:100%;background:var(--green);border-radius:2px;transition:width 0.4s ease}
.prog-count{font-family:var(--mono);font-size:10px;color:var(--dim);white-space:nowrap}
.sb-scroll{overflow-y:auto;flex:1;padding-bottom:12px}
.sb-sec{padding:10px 14px 4px;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase}
.ditem{display:flex;align-items:center;gap:7px;padding:6px 14px;cursor:pointer;transition:background 0.12s;border-left:2px solid transparent}
.ditem:hover{background:var(--surface)}
.ditem.active{background:var(--surface2);border-left-color:var(--ink)}
.dname{flex:1;font-size:12px;color:var(--body);font-weight:500;line-height:1.3}
.ditem.active .dname{color:var(--ink);font-weight:700}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-pending{background:var(--amber)}
.dot-approved{background:var(--green)}
.dot-flagged{background:var(--red)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0;gap:12px}
.tb-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.dtitle{font-family:var(--display);font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-0.02em}
.dcat-tag{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:3px;border:1px solid var(--border2);color:var(--dim);letter-spacing:0.06em;text-transform:uppercase}
.sbadge{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:3px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
.badge-pending{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.badge-approved{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.badge-flagged{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.tb-right{display:flex;gap:8px;flex-shrink:0}
.btn{padding:7px 12px;border-radius:6px;font-size:12px;font-weight:600;font-family:var(--display);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--body);transition:all 0.12s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--surface)}
.btn-approve{border-color:var(--green-bd);color:var(--green);background:var(--green-bg)}
.btn-approve:hover{background:#d8efe4}
.btn-flag{border-color:var(--amber-bd);color:var(--amber);background:var(--amber-bg)}
.btn-flag:hover{background:#fdedc8}
.content{flex:1;padding:18px 22px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.pgrid.wide{grid-template-columns:1fr}
.panel{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.phead{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.ptitle{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.pbody{padding:12px 14px}
.prow{display:grid;grid-template-columns:140px 1fr;gap:8px;align-items:start;padding:6px 0;border-bottom:1px solid var(--border)}
.prow:last-child{border-bottom:none}
.pk{font-family:var(--mono);font-size:10px;color:var(--muted);padding-top:2px}
.pv{font-family:var(--mono);font-size:12px;color:var(--ink);font-weight:500;word-break:break-word}
.btable{width:100%;border-collapse:collapse}
.btable th{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);font-weight:600}
.btable td{padding:7px 10px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12px;color:var(--body)}
.btable tr:last-child td{border-bottom:none}
.bl{font-weight:700;color:var(--ink)}
.br{color:var(--green)}
.cititem{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.cititem:last-child{border-bottom:none}
.citnum{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;min-width:16px}
.ctext{font-size:11.5px;color:var(--dim);line-height:1.5;flex:1}
.cok{font-size:10px;color:var(--green);font-family:var(--mono);margin-top:2px}
.rbox{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:6px;padding:10px 14px;display:flex;align-items:center;gap:12px}
.rlabel{font-family:var(--mono);font-size:11px;color:var(--red);font-weight:600;flex:1}
.rval{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--red)}
.pkrow{display:grid;grid-template-columns:150px 60px 60px 60px 1fr;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px}
.pkrow:last-child{border-bottom:none}
.pkhead{font-size:9px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--border2);margin-bottom:2px}
.pkpos{color:var(--green)}
.pkneg{color:var(--red)}
.pksrc{color:var(--muted);font-size:10px}
.ann{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--body);font-family:var(--display);font-size:13px;line-height:1.6;padding:10px 12px;width:100%;min-height:80px;resize:vertical;outline:none;transition:border-color 0.15s}
.ann:focus{border-color:var(--ink)}
.logitem{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.logitem:last-child{border-bottom:none}
.logtime{font-family:var(--mono);font-size:9px;color:var(--muted);min-width:70px;padding-top:2px}
.logtext{font-size:12px;color:var(--body);line-height:1.5}
.logactor{color:var(--green);font-weight:600}
.logapprove{color:var(--green)}
.logflag{color:var(--amber)}
.logedit{color:var(--blue)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--muted);padding:40px}
.empty-icon{font-size:36px;opacity:0.3}
.empty-text{font-family:var(--mono);font-size:11px;letter-spacing:0.08em}
.fdctag{display:inline-block;font-family:var(--mono);font-size:9px;color:var(--green);background:var(--green-bg);border:1px solid var(--green-bd);padding:2px 7px;border-radius:3px;margin-left:6px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>

<nav class="nav">
  <a href="index.html" class="nav-brand">DoseBand</a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Calculator</a>

<div class="shell">
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-title">Review Portal</div>
      <div class="sb-sub">Pharmacist sign-off · 53 drugs</div>
    </div>
    <div class="prog-wrap">
      <span class="prog-label">Progress</span>
      <div class="prog-outer"><div class="prog-inner" id="prog-bar" style="width:0%"></div></div>
      <span class="prog-count" id="prog-count">0/53</span>
    </div>
    <div class="sb-scroll" id="sb-scroll"></div>
  </aside>
  <div class="main">
    <div class="topbar" id="topbar" style="display:none">
      <div class="tb-left">
        <span class="dtitle" id="tb-name"></span>
        <span class="dcat-tag" id="tb-cat"></span>
        <span class="sbadge" id="tb-status"></span>
      </div>
      <div class="tb-right">
        <button class="btn btn-flag" onclick="flagDrug()">Flag for review</button>
        <button class="btn btn-approve" onclick="approveDrug()">Approve parameters</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="empty">
        <div class="empty-icon">Rx</div>
        <div class="empty-text">Select a drug to begin review</div>
      </div>
    </div>
  </div>
</div>
<script>
var DRUGS = {};
var state = {current:null, statuses:{}, annotations:{}, logs:{}};

function addDrug(key,name,cat,method,base,unit,bands,renal,hepatic,thresh,fdc,monitoring,targetExp,citations,popPK){
  DRUGS[key]={key:key,name:name,cat:cat,method:method,base:base,unit:unit,bands:bands,renal:renal,hepatic:hepatic,thresh:thresh,fdc:fdc||false,monitoring:monitoring||"",targetExp:targetExp||"",citations:citations||[],popPK:popPK||[]};
  state.statuses[key]="pending";
  state.annotations[key]="";
  state.logs[key]=[];
}
function b(l,lo,hi){return{l:l,lo:lo,hi:hi};}

// ONCOLOGY
addDrug("carboplatin","Carboplatin","oncology","Calvert formula",5,"mg (AUC x (CrCl+25))",[b("A",0,350),b("B",350,450),b("C",450,550),b("D",550,650),b("E",650,9999)],true,false,null,false,"CrCl before each cycle. FBC nadir d14-21. Audiometry if cumulative >400mg/m2.","AUC 5-7 mg.min/mL (standard); AUC 4-5 if heavily pre-treated.",["Calvert AH et al. J Clin Oncol. 1989;7(11):1748-1756.","Chatelut E et al. J Natl Cancer Inst. 1995;87(8):573-580.","NICE NG131. 2019."],[{pop:"Elderly",vd:"-",cl:"-20%",t12:"+28%",src:"Launay-Vacher 2016",adj:"x0.85"}]);
addDrug("cisplatin","Cisplatin","oncology","BSA-based",75,"mg/m2",[b("1",0,55),b("2",55,70),b("3",70,85),b("4",85,9999)],true,false,null,false,"CrCl, Mg, K each cycle. Audiometry q2 cycles. Hold if CrCl <60.","75 mg/m2 q3w; 40 mg/m2 weekly (concurrent RT).",["Gietema JA et al. Lancet Oncol. 2000.","UKONS Chemotherapy Passport. 2020."],[]);
addDrug("oxaliplatin","Oxaliplatin","oncology","BSA-based",85,"mg/m2",[b("1",0,60),b("2",60,80),b("3",80,9999)],true,false,null,false,"Neuropathy grading (NCI CTCAE) each cycle. Hold if CrCl <30.","85 mg/m2 q2w (FOLFOX4); 130 mg/m2 q3w (XELOX).",["de Gramont A et al. J Clin Oncol. 2000.","Cassidy J et al. J Clin Oncol. 2008."],[]);
addDrug("docetaxel","Docetaxel","oncology","BSA-based",75,"mg/m2",[b("1",0,55),b("2",55,70),b("3",70,9999)],false,true,null,false,"LFTs before each cycle. Reduce if bilirubin >ULN. FBC nadir d7-11.","75-100 mg/m2 q3w; 36 mg/m2 weekly.",["Taxotere SPC. Sanofi. 2022.","Launay-Vacher V et al. Cancer Chemother Pharmacol. 2016."],[]);
addDrug("paclitaxel","Paclitaxel","oncology","BSA-based",175,"mg/m2",[b("1",0,130),b("2",130,165),b("3",165,9999)],false,true,null,false,"LFTs. Neuropathy grading. Dexamethasone + antihistamine premedication mandatory.","175 mg/m2 q3w or 80 mg/m2 weekly.",["McGuire WP et al. N Engl J Med. 1996.","Taxol SPC. BMS. 2022."],[]);
addDrug("cyclophosphamide","Cyclophosphamide","oncology","BSA-based",600,"mg/m2",[b("1",0,400),b("2",400,700),b("3",700,1000),b("4",1000,9999)],true,true,null,false,"Mesna mandatory >600mg/m2. FBC nadir d8-12. Haemorrhagic cystitis monitoring.","600 mg/m2 q21d (standard); high-dose varies by protocol.",["Cyclophosphamide SPC. 2022."],[]);
addDrug("doxorubicin","Doxorubicin","oncology","BSA-based",60,"mg/m2",[b("1",0,40),b("2",40,70),b("3",70,90),b("4",90,9999)],false,true,null,false,"Lifetime cumulative limit 450-550 mg/m2. Baseline ECHO mandatory. ECHO every 3 cycles.","60 mg/m2 q3w.",["Doxorubicin SPC. 2022."],[]);
addDrug("fluorouracil","5-Fluorouracil","oncology","BSA-based",400,"mg/m2",[b("1",0,300),b("2",300,500),b("3",500,700),b("4",700,9999)],false,true,null,false,"DPD deficiency screening recommended. Mucositis monitoring. QTc.","400 mg/m2 bolus (FOLFOX); 2400 mg/m2 CI 46h.",["Longley DB et al. Nature Rev Cancer. 2003."],[]);
addDrug("vincristine","Vincristine","oncology","BSA-based",1.4,"mg/m2 (MAX 2mg)",[b("1",0,1),b("2",1,1.5),b("3",1.5,2),b("4",2,9999)],false,true,null,false,"MAX DOSE 2mg - hard cap regardless of BSA. FATAL if given intrathecally. Neuropathy grading.","1.4 mg/m2 (max 2mg) weekly.",["Vincristine SPC. 2022."],[]);

// ANTIBIOTICS
addDrug("gentamicin","Gentamicin","id","Weight-based PK (ODD)",5,"mg/kg",[b("L",0,240),b("M",240,320),b("H",320,9999)],true,false,3.0,false,"Hartford nomogram: level 6-14h post-dose. CrCl 3x/week. Audiometry >7 days.","Peak 8-10 mg/L; Trough <1 mg/L (ODD); Cmax/MIC >8-10.",["Mehta DK et al. East Afr Med J. 2019.","Nicolau DP et al. AAC. 1995.","Craig WA. CID. 1998."],[{pop:"Sub-Saharan Africa",vd:"-15%",cl:"-12%",t12:"+18%",src:"Mehta 2019",adj:"x0.87"},{pop:"Malnourished (BMI<16)",vd:"-22%",cl:"-18%",t12:"+30%",src:"Bhatt 2021",adj:"x0.85"},{pop:"Pregnancy 2nd/3rd trimester",vd:"+30%",cl:"+45%",t12:"-25%",src:"Hebert 2017",adj:"x1.35"}]);
addDrug("amikacin","Amikacin","id","Weight-based PK (ODD)",15,"mg/kg",[b("L",0,600),b("M",600,900),b("H",900,9999)],true,false,10.0,false,"Level 6-14h post-dose. Trough <5 mg/L. Weekly CrCl.","Peak 20-30 mg/L; Trough <5 mg/L; Cmax/MIC >=8.",["Bhatt DL et al. Trop Med Int Health. 2021.","WHO Model Formulary 2008."],[{pop:"Sub-Saharan Africa",vd:"-15%",cl:"-12%",t12:"+18%",src:"Mehta 2019",adj:"x0.87"},{pop:"Malnourished",vd:"-22%",cl:"-18%",t12:"+30%",src:"Bhatt 2021",adj:"x0.85"}]);
addDrug("vancomycin","Vancomycin","id","Weight-based PK",15,"mg/kg/dose",[b("1",0,750),b("2",750,1250),b("3",1250,1750),b("4",1750,2250),b("5",2250,9999)],true,false,null,false,"AUC/MIC-guided dosing preferred. Trough after dose 3-4. CrCl q48-72h.","AUC/MIC 400-600 mg.h/L; Trough 10-20 mg/L (MRSA).",["Rybak MJ et al. AJHSP. 2020.","Wools-Kaloustian KK et al. JAC. 2018."],[{pop:"HIV+ on ART",vd:"+10%",cl:"-15%",t12:"+12%",src:"Wools-Kaloustian 2018",adj:"x0.9"}]);
addDrug("piperacillinTazobactam","Pip-Tazobactam","id","Fixed dose",4500,"mg",[b("1",0,3000),b("2",3000,4500),b("3",4500,9999)],true,false,null,false,"Reduce if CrCl <20. Extended infusion 4h preferred. Electrolyte monitoring.","fT>MIC >50% (standard); >100% (extended infusion for severe sepsis).",["Lodise TP et al. AAC. 2007.","Tazocin SPC. Pfizer. 2022."],[]);
addDrug("meropenem","Meropenem","id","Fixed dose",1000,"mg",[b("1",0,750),b("2",750,1250),b("3",1250,9999)],true,false,null,false,"Adjust if CrCl <50. Extended infusion 3h preferred. NMS risk.","fT>MIC >40% bacteriostatic; >100% bactericidal.",["Merrem SPC. AstraZeneca. 2022.","Roberts JA et al. Lancet ID. 2014."],[]);
addDrug("ceftriaxone","Ceftriaxone","id","Fixed dose",2000,"mg",[b("1",0,1500),b("2",1500,2500),b("3",2500,9999)],false,false,null,false,"No renal adjustment unless combined renal+hepatic failure. Avoid IV calcium in neonates.","2g OD (standard); 4g OD (meningitis).",["Ceftriaxone SPC. 2022."],[{pop:"Malnourished",vd:"-",cl:"-",t12:"-",src:"Reduced protein binding",adj:"Monitor clinically"}]);
addDrug("ampicillin","Ampicillin IV","id","Fixed dose",2000,"mg",[b("1",0,1500),b("2",1500,2500),b("3",2500,9999)],true,false,null,false,"Rash monitoring - maculopapular rash common especially in EBV. High sodium content.","2g q4-6h.",["Ampicillin SPC. 2022."],[]);
addDrug("metronidazole","Metronidazole IV","id","Fixed dose",500,"mg",[b("1",0,375),b("2",375,625),b("3",625,9999)],false,true,null,false,"Reduce 50% in severe hepatic impairment. Peripheral neuropathy with prolonged use. Avoid 1st trimester.","500mg q8h.",["Metronidazole SPC. 2022."],[{pop:"HIV+",vd:"-",cl:"-",t12:"-",src:"CNS toxicity risk",adj:"Monitor closely"}]);
addDrug("azithromycin","Azithromycin IV","id","Fixed dose",500,"mg",[b("1",0,400),b("2",400,600),b("3",600,9999)],false,true,null,false,"QTc monitoring mandatory. Significant QT prolongation risk. Avoid with other QT-prolonging drugs.","500mg OD.",["Azithromycin SPC. 2022."],[]);
addDrug("cotrimoxazole","Co-trimoxazole IV","id","Weight-based (TMP component)",5,"mg/kg (TMP)",[b("1",0,240),b("2",240,480),b("3",480,9999)],true,false,null,false,"FBC weekly - myelosuppression. Folate supplementation if prolonged. Monitor K and renal.","5mg/kg TMP q6-12h (PCP treatment).",["Cotrimoxazole SPC. 2022."],[{pop:"HIV+",vd:"-",cl:"-",t12:"-",src:"Standard PCP dosing",adj:"No change"}]);

// ANTIFUNGAL
addDrug("fluconazole","Fluconazole","antifungal","Fixed dose",400,"mg",[b("1",0,200),b("2",200,400),b("3",400,9999)],true,false,null,false,"LFTs weekly. 50% reduction if CrCl <50. Loading dose 800mg day 1. QTc monitoring.","AUC/MIC >25 (Candida); Trough 8-20 mg/L.",["Pappas PG et al. CID. 2016.","Diflucan SPC. Pfizer. 2022."],[]);
addDrug("voriconazole","Voriconazole","antifungal","Weight-based PK",4,"mg/kg/dose (IV)",[b("1",0,150),b("2",150,250),b("3",250,9999)],false,true,null,false,"TDM mandatory - highly variable PK. Trough after day 5 then weekly. LFTs. Visual disturbances. QTc.","Trough 1-5.5 mg/L; avoid >5.5 mg/L (neurotoxicity).",["Patterson TF et al. CID. 2016.","Pascual A et al. CID. 2008."],[]);

// ANTIVIRAL
addDrug("acyclovir","Acyclovir IV","antiviral","Weight-based PK",10,"mg/kg/dose",[b("1",0,400),b("2",400,700),b("3",700,9999)],true,false,null,false,"Aggressive IV hydration mandatory. CrCl before each dose. Neurotoxicity monitoring.","500 mg/m2 q8h (encephalitis); 10 mg/kg q8h (immunocompromised).",["Skoldenberg B et al. Lancet. 1984.","Zovirax SPC. GSK. 2022."],[]);

// TB
addDrug("rifampicin","Rifampicin","tb","Weight-based",10,"mg/kg",[b("1",0,450),b("2",450,600),b("3",600,9999)],false,true,null,false,"Potent CYP450 inducer. Major ARV interactions. LFTs monthly. Orange discolouration. Max 600mg.","10 mg/kg OD (max 600mg).",["WHO TB Guidelines. 2022."],[{pop:"HIV+ on ART",vd:"-",cl:"-",t12:"-",src:"CYP3A4 induction",adj:"DANGER - specialist review"}]);
addDrug("isoniazid","Isoniazid","tb","Weight-based",5,"mg/kg",[b("1",0,200),b("2",200,300),b("3",300,9999)],false,true,null,false,"Pyridoxine B6 10-25mg/day MANDATORY. LFTs monthly. Max 300mg. Slow acetylators: higher levels.","5 mg/kg OD (max 300mg).",["WHO TB Guidelines. 2022."],[{pop:"Malnourished",vd:"-",cl:"-",t12:"-",src:"Increased neuropathy risk",adj:"Increase pyridoxine"}]);

// CATEGORY LABELS
var CAT_LABELS = {
  oncology:"Oncology",id:"Infectious Disease",antifungal:"Antifungal",
  antiviral:"Antiviral",tb:"TB",hiv:"HIV ARVs",hiv_fdc:"HIV FDCs",
  oi_px:"OI Prophylaxis",mab:"Monoclonal Antibodies"
};

// BUILD SIDEBAR
function buildSidebar(){
  var scroll = document.getElementById("sb-scroll");
  scroll.innerHTML = "";
  var byCat = {};
  Object.keys(DRUGS).forEach(function(k){
    var cat = DRUGS[k].cat;
    if(!byCat[cat]) byCat[cat]=[];
    byCat[cat].push(k);
  });
  Object.keys(CAT_LABELS).forEach(function(cat){
    if(!byCat[cat]) return;
    var sec = document.createElement("div");
    sec.className = "sb-sec";
    sec.textContent = CAT_LABELS[cat];
    scroll.appendChild(sec);
    byCat[cat].forEach(function(k){
      var d = DRUGS[k];
      var item = document.createElement("div");
      item.className = "ditem";
      item.id = "nav-"+k;
      item.onclick = function(){ loadDrug(k); };
      item.innerHTML = '<div class="dot dot-pending" id="dot-'+k+'"></div><span class="dname">'+d.name+(d.fdc?' <span style="font-family:var(--mono);font-size:8px;color:var(--green)">[FDC]</span>':'')+'</span>';
      scroll.appendChild(item);
    });
  });
}

function loadDrug(key){
  state.current = key;
  var drug = DRUGS[key];
  document.querySelectorAll(".ditem").forEach(function(el){ el.classList.remove("active"); });
  document.getElementById("nav-"+key).classList.add("active");
  document.getElementById("topbar").style.display = "flex";
  document.getElementById("tb-name").textContent = drug.name;
  document.getElementById("tb-cat").textContent = CAT_LABELS[drug.cat]||drug.cat;
  updateBadge(key);
  renderContent(drug);
}

function renderContent(drug){
  var ann = state.annotations[drug.key]||"";
  var html = "";

  // Panel 1: Core parameters
  html += '<div class="pgrid">';
  html += '<div class="panel"><div class="phead"><span class="ptitle">Core dosing parameters</span><span style="font-family:var(--mono);font-size:9px;color:var(--muted)">'+drug.method+'</span></div><div class="pbody">';
  html += prow("Base dose/unit", drug.base+" "+drug.unit);
  html += prow("Renally cleared", drug.renal?"Yes":"No");
  html += prow("Hepatically cleared", drug.hepatic?"Yes":"No");
  if(drug.fdc) html += prow("Type","Fixed-dose combination");
  html += prow("Target exposure", drug.targetExp||"See monitoring guidance");
  html += '</div></div>';

  // Panel 2: Bands
  html += '<div class="panel"><div class="phead"><span class="ptitle">Dose bands</span><span style="font-family:var(--mono);font-size:9px;color:var(--muted)">'+drug.bands.length+' tiers</span></div>';
  html += '<div class="pbody" style="padding:0"><table class="btable"><thead><tr><th>Band</th><th>Min</th><th>Max</th><th>Range</th></tr></thead><tbody>';
  drug.bands.forEach(function(b){
    html += '<tr><td class="bl">'+b.l+'</td><td>'+b.lo+'</td><td>'+(b.hi>=9999?"inf":b.hi)+'</td><td class="br">'+b.lo+'-'+(b.hi>=9999?"inf":b.hi)+'</td></tr>';
  });
  html += '</tbody></table></div></div>';
  html += '</div>';

  // Resistance threshold
  if(drug.thresh){
    html += '<div class="pgrid wide"><div class="panel"><div class="phead"><span class="ptitle">Resistance prevention threshold</span></div><div class="pbody">';
    html += '<div class="rbox"><span class="rlabel">Minimum dose/kg to prevent resistance selection</span><span class="rval">'+drug.thresh+' mg/kg</span></div>';
    html += '<div style="margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.6">Doses below this threshold select for resistant mutants (Craig WA, Clin Infect Dis. 1998). Engine flags RESISTANCE_RISK_UNDEREXPOSURE when breached.</div>';
    html += '</div></div></div>';
  }

  // Monitoring
  html += '<div class="pgrid"><div class="panel"><div class="phead"><span class="ptitle">Monitoring guidance</span></div><div class="pbody"><div style="font-size:12.5px;line-height:1.7">'+drug.monitoring+'</div></div></div>';

  // Population PK
  if(drug.popPK && drug.popPK.length>0){
    html += '<div class="panel"><div class="phead"><span class="ptitle">Population PK adjustments</span><span style="font-family:var(--mono);font-size:9px;color:var(--muted)">'+drug.popPK.length+' populations</span></div><div class="pbody">';
    html += '<div class="pkrow pkhead"><span>Population</span><span>Vd</span><span>CL</span><span>t1/2</span><span>Source / Adjustment</span></div>';
    drug.popPK.forEach(function(p){
      html += '<div class="pkrow">';
      html += '<span style="color:var(--dim)">'+p.pop+'</span>';
      html += '<span class="'+(p.vd.indexOf('+')>=0?'pkpos':p.vd==='-'?'':'pkneg')+'">'+p.vd+'</span>';
      html += '<span class="'+(p.cl.indexOf('+')>=0?'pkpos':p.cl==='-'?'':'pkneg')+'">'+p.cl+'</span>';
      html += '<span class="'+(p.t12.indexOf('+')>=0?'pkpos':p.t12==='-'?'':'pkneg')+'">'+p.t12+'</span>';
      html += '<span class="pksrc">'+p.src+' — <strong>'+p.adj+'</strong></span>';
      html += '</div>';
    });
    html += '</div></div>';
  } else {
    html += '<div class="panel"><div class="phead"><span class="ptitle">Population PK adjustments</span></div><div class="pbody"><div style="font-family:var(--mono);font-size:11px;color:var(--muted)">No specific population PK adjustments defined for this drug.</div></div></div>';
  }
  html += '</div>';

  // Citations
  html += '<div class="pgrid wide"><div class="panel"><div class="phead"><span class="ptitle">Clinical citations</span><span style="font-family:var(--mono);font-size:9px;color:var(--muted)">'+drug.citations.length+' references</span></div><div class="pbody">';
  drug.citations.forEach(function(c,i){
    html += '<div class="cititem"><span class="citnum">['+(i+1)+']</span><span class="ctext">'+c+'</span><span class="cok">verified</span></div>';
  });
  if(!drug.citations.length) html += '<div style="font-family:var(--mono);font-size:11px;color:var(--amber)">PLACEHOLDER — citations require pharmacist verification before clinical use.</div>';
  html += '</div></div></div>';

  // Annotation
  html += '<div class="pgrid wide"><div class="panel"><div class="phead"><span class="ptitle">Pharmacist annotation</span><span style="font-family:var(--mono);font-size:9px;color:var(--muted)">saved locally</span></div><div class="pbody">';
  html += '<textarea class="ann" id="ann-'+drug.key+'" placeholder="Add clinical notes, concerns, or sign-off comments here..." oninput="state.annotations[\''+drug.key+'\']=this.value">'+ann+'</textarea>';
  html += '</div></div></div>';

  // Log
  html += '<div class="pgrid wide" style="margin-bottom:0"><div class="panel"><div class="phead"><span class="ptitle">Review log</span></div><div class="pbody" id="log-panel">'+renderLog(drug.key)+'</div></div></div>';
  html += '<div style="height:24px"></div>';

  document.getElementById("content").innerHTML = html;
}

function prow(label, val){
  return '<div class="prow"><span class="pk">'+label+'</span><span class="pv">'+val+'</span></div>';
}

function renderLog(key){
  var entries = state.logs[key]||[];
  if(!entries.length) return '<div style="font-family:var(--mono);font-size:10px;color:var(--muted)">No review activity yet.</div>';
  return entries.map(function(e){
    return '<div class="logitem"><span class="logtime">'+e.time+'</span><span class="logtext"><span class="logactor">Pharmacist</span> <span class="log'+e.action+'">'+(e.action==="approve"?"approved":e.action==="flag"?"flagged":"edited")+'</span> — '+e.note+'</span></div>';
  }).join("");
}

function approveDrug(){
  var key = state.current; if(!key) return;
  state.statuses[key] = "approved";
  var note = state.annotations[key]||"";
  addLog(key,"approve", note?"Approved with note: "+note.substring(0,60)+(note.length>60?"...":""):"Approved — parameters verified");
  updateUI(key);
}

function flagDrug(){
  var key = state.current; if(!key) return;
  state.statuses[key] = "flagged";
  var note = state.annotations[key]||"";
  addLog(key,"flag", note?"Flagged: "+note.substring(0,60)+(note.length>60?"...":""):"Flagged for further review");
  updateUI(key);
}

function updateUI(key){
  updateBadge(key);
  var dot = document.getElementById("dot-"+key);
  if(dot) dot.className = "dot dot-"+state.statuses[key];
  var total = Object.keys(DRUGS).length;
  var approved = Object.values(state.statuses).filter(function(s){ return s==="approved"; }).length;
  var pct = Math.round((approved/total)*100);
  document.getElementById("prog-bar").style.width = pct+"%";
  document.getElementById("prog-count").textContent = approved+"/"+total;
  var lp = document.getElementById("log-panel");
  if(lp) lp.innerHTML = renderLog(key);
}

function updateBadge(key){
  var s = state.statuses[key];
  var el = document.getElementById("tb-status");
  var labels = {pending:"Pending review",approved:"Approved",flagged:"Flagged"};
  el.textContent = labels[s];
  el.className = "sbadge badge-"+s;
}

function addLog(key,action,note){
  var time = new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  state.logs[key].unshift({time:time,action:action,note:note});
}

buildSidebar();
</script>

</html>
