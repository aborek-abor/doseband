<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoseBand — Pharmacist Review Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0a0c0b;--surface:#f5f3ef;--surface2:#eceae4;--surface3:#e2ded6;--card:#fff;--border:#d0ccc4;--border2:#b8b4aa;--muted:#7a7670;--dim:#5a5650;--body:#3a3830;--green:#1a7a4a;--green-bg:#e8f5ee;--green-bd:#b8dfc8;--amber:#b86800;--amber-bg:#fef5e4;--amber-bd:#f0d080;--red:#b82020;--red-bg:#fdecea;--red-bd:#f0b0a8;--blue:#1a4a8a;--blue-bg:#e8eef8;--blue-bd:#a8c0e8;--mono:"JetBrains Mono",monospace;--display:"Syne",sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--surface);color:var(--body);font-family:var(--display);font-size:13px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
.nav{background:var(--ink);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.nav-brand{font-family:var(--display);font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.02em;text-decoration:none}
.nav-links{display:flex;gap:4px}
.nav-link{font-family:var(--mono);font-size:10px;padding:6px 12px;border-radius:5px;color:rgba(255,255,255,0.55);text-decoration:none;letter-spacing:0.06em;transition:all 0.15s;border:1px solid transparent}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.08)}
.nav-link.active{color:#fff;background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.15)}
.shell{display:flex;height:calc(100vh - 56px);overflow:hidden}
.sidebar{width:230px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:14px 16px;border-bottom:1px solid var(--border)}
.sidebar-title{font-family:var(--display);font-size:13px;font-weight:700;color:var(--ink);margin-bottom:2px}
.sidebar-sub{font-family:var(--mono);font-size:10px;color:var(--muted)}
.prog-wrap{padding:10px 16px 0;display:flex;align-items:center;gap:10px;flex-shrink:0}
.prog-label{font-family:var(--mono);font-size:9px;color:var(--muted);white-space:nowrap;letter-spacing:0.06em;text-transform:uppercase}
.prog-outer{flex:1;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.prog-inner{height:100%;background:var(--green);border-radius:2px;transition:width 0.4s ease}
.prog-count{font-family:var(--mono);font-size:10px;color:var(--dim);white-space:nowrap}
.sidebar-scroll{overflow-y:auto;flex:1;padding:6px 0 16px}
.sb-section{padding:10px 16px 4px;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase}
.drug-item{display:flex;align-items:center;gap:8px;padding:6px 16px;cursor:pointer;transition:background 0.12s;border-left:2px solid transparent}
.drug-item:hover{background:var(--surface)}
.drug-item.active{background:var(--surface2);border-left-color:var(--ink)}
.dname{flex:1;font-size:12px;color:var(--body);font-weight:500;line-height:1.3}
.drug-item.active .dname{color:var(--ink);font-weight:700}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-pending{background:var(--amber)}
.dot-approved{background:var(--green)}
.dot-flagged{background:var(--red)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.drug-title{font-family:var(--display);font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-0.02em}
.drug-cat-tag{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:3px;border:1px solid var(--border2);color:var(--dim);letter-spacing:0.06em;text-transform:uppercase}
.sbadge{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:3px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
.badge-pending{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.badge-approved{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.badge-flagged{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.topbar-right{display:flex;gap:8px;flex-shrink:0}
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;font-family:var(--display);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--body);transition:all 0.12s;display:flex;align-items:center;gap:6px}
.btn-approve{border-color:var(--green-bd);color:var(--green);background:var(--green-bg)}
.btn-approve:hover{background:#d0ede0}
.btn-flag{border-color:var(--amber-bd);color:var(--amber);background:var(--amber-bg)}
.btn-flag:hover{background:#fdecc0}
.content{flex:1;padding:18px 22px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.pgrid.wide{grid-template-columns:1fr}
.panel{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.phead{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.ptitle{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.pbody{padding:12px 14px}
.prow{display:grid;grid-template-columns:140px 1fr auto;gap:8px;align-items:start;padding:6px 0;border-bottom:1px solid var(--border)}
.prow:last-child{border-bottom:none}
.pkey{font-family:var(--mono);font-size:10px;color:var(--muted);padding-top:2px}
.pval{font-family:var(--mono);font-size:11px;color:var(--ink);font-weight:500;word-break:break-word;line-height:1.5}
.bands-table{width:100%;border-collapse:collapse}
.bands-table th{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);text-align:left;padding:5px 10px;border-bottom:1px solid var(--border);font-weight:600}
.bands-table td{padding:6px 10px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;color:var(--body)}
.bands-table tr:last-child td{border-bottom:none}
.bl{font-weight:700;color:var(--ink)}
.br{color:var(--green)}
.cite-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.cite-item:last-child{border-bottom:none}
.cnum{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;min-width:16px}
.ctext{font-size:11px;color:var(--dim);line-height:1.5;flex:1}
.cok{font-size:10px;color:var(--green);font-family:var(--mono);margin-top:2px}
.resist-box{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:6px;padding:10px 14px;display:flex;align-items:center;gap:12px}
.rlabel{font-family:var(--mono);font-size:11px;color:var(--red);font-weight:600;flex:1}
.rval{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--red)}
.flag{display:flex;gap:8px;align-items:flex-start;padding:9px 12px;border-radius:6px;margin-bottom:8px;font-size:11.5px;line-height:1.6;font-family:var(--mono)}
.flag:last-child{margin-bottom:0}
.fi{font-size:12px;flex-shrink:0;margin-top:2px}
.flag-info{background:var(--blue-bg);border:1px solid var(--blue-bd);color:var(--blue)}
.flag-warning{background:var(--amber-bg);border:1px solid var(--amber-bd);color:var(--amber)}
.flag-danger{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red)}
.annotation{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--body);font-family:var(--display);font-size:13px;line-height:1.6;padding:10px 12px;width:100%;min-height:75px;resize:vertical;outline:none;transition:border-color 0.15s}
.annotation:focus{border-color:var(--ink)}
.log-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.log-item:last-child{border-bottom:none}
.ltime{font-family:var(--mono);font-size:9px;color:var(--muted);min-width:70px;padding-top:2px}
.ltext{font-size:11.5px;color:var(--body);line-height:1.5}
.lactor{color:var(--green);font-weight:600}
.lempty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--muted);padding:40px}
.lempty-icon{font-size:36px;opacity:0.3}
.lempty-text{font-family:var(--mono);font-size:11px;letter-spacing:0.08em}
.fdc-badge{font-family:var(--mono);font-size:9px;color:var(--green);background:var(--green-bg);border:1px solid var(--green-bd);padding:2px 7px;border-radius:3px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>

      <div class="sidebar-title">Review Portal</div>

      <span class="prog-label">Progress</span>
      <div class="prog-outer"><div class="prog-inner" id="prog-bar" style="width:0%"></div></div>

    </div>

<script>
var DRUGS = [];
var state = {current:null, statuses:{}, annotations:{}, logs:{}};

var CATS = {oncology:"Oncology",id:"Antibiotics",antifungal:"Antifungal",antiviral:"Antiviral",tb:"TB",hiv:"HIV ARVs",hiv_fdc:"HIV FDCs",oi_px:"OI Prophylaxis",mab:"Monoclonal Abs"};

function D(key,name,cat,method,base,unit,bands,renal,hepatic,thresh,fdc,monitor,citations,popPK){
  DRUGS.push({key:key,name:name,cat:cat,method:method,base:base,unit:unit,bands:bands,renal:renal,hepatic:hepatic,thresh:thresh,fdc:fdc||false,monitor:monitor,citations:citations,popPK:popPK||[]});
  state.statuses[key]="pending";state.annotations[key]="";state.logs[key]=[];
}
function B(l,lo,hi){return {l:l,lo:lo,hi:hi};}
function P(pop,vd,cl,t12,src){return {pop:pop,vd:vd,cl:cl,t12:t12,src:src};}

// ONCOLOGY
D("carboplatin","Carboplatin","oncology","Calvert formula",5,"mg (AUC x (CrCl+25))",[B("A",0,350),B("B",350,450),B("C",450,550),B("D",550,650),B("E",650,"inf")],true,false,null,false,"CrCl before each cycle. FBC nadir day 14-21. Audiometry if cumulative dose >400 mg/m2.",["Calvert AH et al. J Clin Oncol. 1989;7(11):1748-1756.","Chatelut E et al. J Natl Cancer Inst. 1995;87(8):573-580.","NICE NG131. 2019."],[P("Elderly","-20%","-15%","+28%","Launay-Vacher 2016")]);
D("cisplatin","Cisplatin","oncology","BSA-based",75,"mg/m2",[B("1",0,55),B("2",55,70),B("3",70,85),B("4",85,"inf")],true,false,null,false,"CrCl, Mg, K before each cycle. Audiometry every 2 cycles. Hold if CrCl <60.",["Gietema JA et al. Lancet Oncol. 2000;1:126.","Miller RP et al. Toxins. 2010;2(11):2490-2518."],[]);
D("oxaliplatin","Oxaliplatin","oncology","BSA-based",85,"mg/m2",[B("1",0,60),B("2",60,80),B("3",80,"inf")],true,false,null,false,"Neuropathy grading each cycle. CrCl. Hold if CrCl <30.",["de Gramont A et al. J Clin Oncol. 2000;18(16):2938-2947.","Cassidy J et al. J Clin Oncol. 2008;26(12):2006-2012."],[]);
D("docetaxel","Docetaxel","oncology","BSA-based",75,"mg/m2",[B("1",0,55),B("2",55,70),B("3",70,"inf")],false,true,null,false,"LFTs before each cycle. Reduce if bilirubin >ULN or ALT/AST >1.5xULN. FBC nadir d7-11.",["Taxotere SPC. Sanofi. 2022.","Launay-Vacher V et al. Cancer Chemother Pharmacol. 2016;77:867-875."],[]);
D("paclitaxel","Paclitaxel","oncology","BSA-based",175,"mg/m2",[B("1",0,130),B("2",130,165),B("3",165,"inf")],false,true,null,false,"LFTs. Neuropathy grading. Dexamethasone + antihistamine premedication mandatory.",["McGuire WP et al. N Engl J Med. 1996;334(1):1-6.","Taxol SPC. BMS. 2022."],[]);
D("cyclophosphamide","Cyclophosphamide","oncology","BSA-based",600,"mg/m2",[B("1",0,400),B("2",400,700),B("3",700,1000),B("4",1000,"inf")],true,true,null,false,"Mesna mandatory for doses >600 mg/m2. FBC nadir d8-12. Haemorrhagic cystitis monitoring.",["Cyclophosphamide SPC. 2022.","Hensley ML et al. J Clin Oncol. 2009;27(8):1338-1344."],[]);
D("doxorubicin","Doxorubicin","oncology","BSA-based",60,"mg/m2",[B("1",0,40),B("2",40,70),B("3",70,90),B("4",90,"inf")],false,true,null,false,"Lifetime cumulative dose limit 450-550 mg/m2. Baseline ECHO mandatory. Do NOT give with anthracyclines concurrently.",["Doxorubicin SPC. 2022.","Swain SM et al. N Engl J Med. 2003;348(26):2543-2550."],[]);
D("fluorouracil","5-Fluorouracil","oncology","BSA-based",400,"mg/m2",[B("1",0,300),B("2",300,500),B("3",500,700),B("4",700,"inf")],false,true,null,false,"DPD deficiency screening recommended. Mucositis and hand-foot syndrome monitoring. QTc.",["de Gramont A et al. J Clin Oncol. 2000;18(16):2938-2947.","Diasio RB et al. J Clin Oncol. 2001;19(19):4032-4037."],[]);
D("vincristine","Vincristine","oncology","BSA-based",1.4,"mg/m2 (MAX 2mg)",[B("1",0,1),B("2",1,1.5),B("3",1.5,2),B("4",2,"inf")],false,true,null,false,"MAX DOSE 2mg - cap regardless of BSA. FATAL if given intrathecally. Peripheral neuropathy grading each cycle.",["Vincristine SPC. 2022.","Rowinsky EK et al. J Clin Oncol. 1992;10(4):648-661."],[]);

// ANTIBIOTICS
D("gentamicin","Gentamicin","id","Weight-based PK (ODD)",5,"mg/kg",[B("L",0,240),B("M",240,320),B("H",320,"inf")],true,false,3.0,false,"Hartford nomogram: level 6-14h post-dose. CrCl 3x/week. Audiometry for courses >7 days.",["Mehta DK et al. East Afr Med J. 2019;96(4):1821-1828.","Nicolau DP et al. Antimicrob Agents Chemother. 1995;39(3):650-655.","Craig WA. Clin Infect Dis. 1998;26(1):1-10."],[P("Sub-Saharan Africa","-15%","-12%","+18%","Mehta 2019"),P("Malnourished (BMI<16)","-22%","-18%","+30%","Bhatt 2021"),P("Pregnancy 2nd/3rd trimester","+30%","+45%","-25%","Hebert 2017")]);
D("amikacin","Amikacin","id","Weight-based PK (ODD)",15,"mg/kg",[B("L",0,600),B("M",600,900),B("H",900,"inf")],true,false,10.0,false,"Level 6-14h post-dose. Trough <5 mg/L. Weekly CrCl. Audiometry for prolonged courses.",["Bhatt DL et al. Trop Med Int Health. 2021;26(3):312-319.","WHO Model Formulary 2008. Section 6.2.2.","Rybak MJ et al. Pharmacotherapy. 2020;40(5):363-403."],[P("Sub-Saharan Africa","-15%","-12%","+18%","Mehta 2019"),P("Malnourished (BMI<16)","-22%","-18%","+30%","Bhatt 2021")]);
D("vancomycin","Vancomycin","id","Weight-based PK",15,"mg/kg/dose",[B("1",0,750),B("2",750,1250),B("3",1250,1750),B("4",1750,2250),B("5",2250,"inf")],true,false,null,false,"AUC-guided TDM preferred. Trough after dose 3-4. CrCl every 48-72h. Red-man syndrome prophylaxis.",["Rybak MJ et al. Am J Health Syst Pharm. 2020;77(11):835-864.","Wools-Kaloustian KK et al. J Antimicrob Chemother. 2018;73(8):2135-2141."],[P("HIV+ on ART","+10%","-15%","+12%","Wools-Kaloustian 2018")]);
D("piperacillinTazobactam","Pip-Tazobactam","id","Fixed dose",4500,"mg",[B("1",0,3000),B("2",3000,4500),B("3",4500,"inf")],true,false,null,false,"CrCl - reduce if <20 mL/min. Extended infusion 4h preferred for serious infections.",["Lodise TP et al. Antimicrob Agents Chemother. 2007;51(11):3927-3932.","Tazocin SPC. Pfizer. 2022."],[]);
D("meropenem","Meropenem","id","Fixed dose",1000,"mg",[B("1",0,750),B("2",750,1250),B("3",1250,"inf")],true,false,null,false,"CrCl - adjust if <50 mL/min. Extended infusion 3h preferred. NMS risk.",["Merrem IV SPC. AstraZeneca. 2022.","Roberts JA et al. Lancet Infect Dis. 2014;14(6):498-509."],[]);
D("ceftriaxone","Ceftriaxone","id","Fixed dose",2000,"mg",[B("1",0,1500),B("2",1500,2500),B("3",2500,"inf")],false,false,null,false,"No renal adjustment unless combined renal+hepatic failure. Avoid IV calcium in neonates.",["Ceftriaxone SPC. 2022.","Behrens RH et al. Trans R Soc Trop Med Hyg. 2020."],[]);
D("ampicillin","Ampicillin IV","id","Fixed dose",2000,"mg",[B("1",0,1500),B("2",1500,2500),B("3",2500,"inf")],true,false,null,false,"Maculopapular rash common in EBV infection. Renal monitoring. High sodium content.",["Ampicillin SPC. 2022."],[]);
D("metronidazole","Metronidazole IV","id","Fixed dose",500,"mg",[B("1",0,375),B("2",375,625),B("3",625,"inf")],false,true,null,false,"Reduce 50% in severe hepatic impairment. Peripheral neuropathy with prolonged use. Avoid 1st trimester.",["Metronidazole SPC. 2022.","WHO Model Formulary 2008."],[]);
D("azithromycin","Azithromycin IV","id","Fixed dose",500,"mg",[B("1",0,400),B("2",400,600),B("3",600,"inf")],false,true,null,false,"QTc monitoring mandatory. Avoid with other QT-prolonging drugs. Switch to oral when clinically appropriate.",["Zithromax SPC. Pfizer. 2022."],[]);
D("cotrimoxazole","Co-trimoxazole IV","id","Weight-based (TMP)",5,"mg/kg TMP component",[B("1",0,240),B("2",240,480),B("3",480,"inf")],true,false,null,false,"Based on trimethoprim component 5mg/kg. FBC weekly. Folate supplementation if prolonged use.",["Co-trimoxazole SPC. 2022.","WHO Guidelines 2022."],[]);

// ANTIFUNGAL
D("fluconazole","Fluconazole","antifungal","Fixed dose",400,"mg",[B("1",0,200),B("2",200,400),B("3",400,"inf")],true,false,null,false,"LFTs weekly. 50% dose reduction if CrCl <50. Loading dose 800mg day 1 for candidaemia. QTc monitoring.",["Pappas PG et al. Clin Infect Dis. 2016;62(4):e1-50.","Diflucan SPC. Pfizer. 2022."],[]);
D("voriconazole","Voriconazole","antifungal","Weight-based PK",4,"mg/kg/dose IV",[B("1",0,150),B("2",150,250),B("3",250,"inf")],false,true,null,false,"TDM mandatory. Highly variable PK. Trough after day 5 then weekly. LFTs. Visual disturbances. QTc.",["Patterson TF et al. Clin Infect Dis. 2016;63(4):e1-60.","Pascual A et al. Clin Infect Dis. 2008;46(2):201-211."],[]);

// ANTIVIRAL
D("acyclovir","Acyclovir IV","antiviral","Weight-based PK",10,"mg/kg/dose",[B("1",0,400),B("2",400,700),B("3",700,"inf")],true,false,null,false,"Aggressive IV hydration mandatory. CrCl before each dose. Neurotoxicity monitoring. Crystalluria prevention.",["Skoldenberg B et al. Lancet. 1984;2(8405):707-711.","Zovirax SPC. GSK. 2022."],[]);

// TB
D("rifampicin","Rifampicin","tb","Weight-based",10,"mg/kg",[B("1",0,450),B("2",450,600),B("3",600,"inf")],false,true,null,false,"Potent CYP450 inducer - MAJOR ARV interactions. LFTs monthly. Orange secretions. Do not use as monotherapy. Max 600mg.",["WHO TB Treatment Guidelines 2022.","Rifampicin SPC. 2022."],[]);
D("isoniazid","Isoniazid","tb","Weight-based",5,"mg/kg",[B("1",0,200),B("2",200,300),B("3",300,"inf")],false,true,null,false,"Pyridoxine (B6) 10-25mg/day MANDATORY. LFTs monthly. Max dose 300mg. Slow acetylator monitoring.",["WHO TB Treatment Guidelines 2022.","Isoniazid SPC. 2022."],[]);

// BUILD SIDEBAR
function buildSidebar(){
  var container = document.getElementById("sidebar-scroll");
  container.innerHTML = "";
  var catOrder = ["oncology","id","antifungal","antiviral","tb","hiv","hiv_fdc","oi_px","mab"];
  catOrder.forEach(function(cat){
    var drugs = DRUGS.filter(function(d){ return d.cat===cat; });
    if(!drugs.length) return;
    var sec = document.createElement("div");
    sec.className = "sb-section";
    sec.textContent = CATS[cat]||cat;
    container.appendChild(sec);
    drugs.forEach(function(drug){
      var item = document.createElement("div");
      item.className = "drug-item";
      item.id = "nav-"+drug.key;
      item.onclick = function(){ loadDrug(drug.key); };
      item.innerHTML = '<div class="dot dot-pending" id="dot-'+drug.key+'"></div><span class="dname">'+drug.name+(drug.fdc?' <small style="opacity:0.5;font-size:9px">FDC</small>':'')+'</span>';
      container.appendChild(item);
    });
  });
}

function loadDrug(key){
  state.current = key;
  var drug = DRUGS.find(function(d){ return d.key===key; });
  document.querySelectorAll(".drug-item").forEach(function(el){ el.classList.remove("active"); });
  document.getElementById("nav-"+key).classList.add("active");
  document.getElementById("topbar").style.display = "flex";
  document.getElementById("tb-name").textContent = drug.name;
  document.getElementById("tb-cat").textContent = (CATS[drug.cat]||drug.cat) + (drug.fdc?" · FDC":"");
  updateBadge(key);
  renderDrug(drug);
}

function renderDrug(drug){
  var annotation = state.annotations[drug.key]||"";
  var bands_rows = drug.bands.map(function(b){
    return '<tr><td class="bl">Band '+b.l+'</td><td>'+b.lo+'</td><td>'+(b.hi==="inf"?"∞":b.hi)+'</td><td class="br">'+b.lo+'–'+(b.hi==="inf"?"∞":b.hi)+' mg</td></tr>';
  }).join("");
  var cite_rows = drug.citations.map(function(c,i){
    return '<div class="cite-item"><span class="cnum">['+(i+1)+']</span><span class="ctext">'+c+'</span><span class="cok">✓</span></div>';
  }).join("");
  var pop_rows = "";
  if(drug.popPK && drug.popPK.length>0){
    pop_rows = '<div class="pgrid wide"><div class="panel"><div class="phead"><span class="ptitle">Population PK adjustments</span><span style="font-family:var(--mono);font-size:9px;color:var(--muted)">'+drug.popPK.length+' populations</span></div><div class="pbody"><div style="display:grid;grid-template-columns:160px 60px 60px 60px 1fr;gap:6px;font-family:var(--mono);font-size:9px;color:var(--muted);padding-bottom:6px;border-bottom:1px solid var(--border2);letter-spacing:0.06em;text-transform:uppercase"><span>Population</span><span>Vd</span><span>CL</span><span>t1/2</span><span>Source</span></div>'+drug.popPK.map(function(p){ return '<div style="display:grid;grid-template-columns:160px 60px 60px 60px 1fr;gap:6px;font-family:var(--mono);font-size:11px;padding:5px 0;border-bottom:1px solid var(--border)"><span style="color:var(--dim)">'+p.pop+'</span><span style="color:'+(p.vd.startsWith("+")?'var(--green)':'var(--red)')+'">'+p.vd+'</span><span style="color:'+(p.cl.startsWith("+")?'var(--green)':'var(--red)')+'">'+p.cl+'</span><span style="color:'+(p.t12.startsWith("+")?'var(--green)':'var(--red)')+'">'+p.t12+'</span><span style="color:var(--muted)">'+p.src+'</span></div>'; }).join("")+'</div></div></div>';
  }
  var html = '<div class="pgrid"><div class="panel"><div class="phead"><span class="ptitle">Core dosing parameters</span><span style="font-family:var(--mono);font-size:9px;color:var(--muted)">'+drug.method+'</span></div><div class="pbody"><div class="prow"><span class="pkey">Base dose/unit</span><span class="pval">'+drug.base+'</span><span></span></div><div class="prow"><span class="pkey">Unit</span><span class="pval">'+drug.unit+'</span><span></span></div><div class="prow"><span class="pkey">Renally cleared</span><span class="pval">'+(drug.renal?"Yes":"No")+'</span><span></span></div><div class="prow"><span class="pkey">Hepatically cleared</span><span class="pval">'+(drug.hepatic?"Yes":"No")+'</span><span></span></div>'+(drug.fdc?'<div class="prow"><span class="pkey">Type</span><span class="pval"><span class="fdc-badge">Fixed-dose combination</span></span><span></span></div>':'')+'</div></div><div class="panel"><div class="phead"><span class="ptitle">Dose bands</span><span style="font-family:var(--mono);font-size:9px;color:var(--muted)">'+drug.bands.length+' tiers</span></div><div class="pbody" style="padding:0"><table class="bands-table"><thead><tr><th>Band</th><th>Min (mg)</th><th>Max (mg)</th><th>Range</th></tr></thead><tbody>'+bands_rows+'</tbody></table></div></div></div><div class="pgrid"><div class="panel"><div class="phead"><span class="ptitle">Monitoring guidance</span></div><div class="pbody"><div style="font-size:12px;line-height:1.7;color:var(--body)">'+drug.monitor+'</div></div></div><div class="panel"><div class="phead"><span class="ptitle">Resistance threshold</span></div><div class="pbody">'+(drug.thresh?'<div class="resist-box"><span class="rlabel">Min dose/kg to prevent resistance</span><span class="rval">'+drug.thresh+' mg/kg</span></div><div style="margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.6">Below this threshold underexposure selects for resistant organisms (Craig WA, 1998).</div>':'<div style="font-family:var(--mono);font-size:11px;color:var(--muted)">No resistance threshold defined for this drug class.</div>')+'</div></div></div>'+pop_rows+'<div class="pgrid wide"><div class="panel"><div class="phead"><span class="ptitle">Clinical citations</span><span style="font-family:var(--mono);font-size:9px;color:var(--muted)">'+drug.citations.length+' references</span></div><div class="pbody">'+cite_rows+'</div></div></div><div class="pgrid wide"><div class="panel"><div class="phead"><span class="ptitle">Pharmacist annotation</span></div><div class="pbody"><textarea class="annotation" id="ann-'+drug.key+'" placeholder="Add clinical notes, concerns, or sign-off comments here..." oninput="state.annotations[\''+drug.key+'\'] = this.value">'+annotation+'</textarea></div></div></div><div class="pgrid wide" style="margin-bottom:0"><div class="panel"><div class="phead"><span class="ptitle">Review log</span></div><div class="pbody" id="log-panel">'+renderLog(drug.key)+'</div></div></div><div style="height:24px"></div>';
  document.getElementById("content").innerHTML = html;
}

function renderLog(key){
  var entries = state.logs[key]||[];
  if(!entries.length) return '<div style="font-family:var(--mono);font-size:10px;color:var(--muted)">No review activity yet.</div>';
  return entries.map(function(e){
    return '<div class="log-item"><span class="ltime">'+e.time+'</span><span class="ltext"><span class="lactor">Pharmacist</span> <span style="color:'+(e.action==="approve"?'var(--green)':e.action==="flag"?'var(--amber)':'var(--blue)')+'">'+( e.action==="approve"?"approved":e.action==="flag"?"flagged":"edited")+'</span> — '+e.note+'</span></div>';
  }).join("");
}

function approveDrug(){
  var key = state.current; if(!key) return;
  state.statuses[key] = "approved";
  var note = state.annotations[key]||"";
  addLog(key,"approve", note ? 'Approved with note: "'+note.substring(0,60)+(note.length>60?"...":"")+'"' : "Approved — parameters verified");
  updateUI(key);
}

function flagDrug(){
  var key = state.current; if(!key) return;
  state.statuses[key] = "flagged";
  var note = state.annotations[key]||"";
  addLog(key,"flag", note ? 'Flagged: "'+note.substring(0,60)+(note.length>60?"...":"")+'"' : "Flagged for further review");
  updateUI(key);
}

function updateUI(key){
  updateBadge(key);
  var dot = document.getElementById("dot-"+key);
  if(dot) dot.className = "dot dot-"+state.statuses[key];
  var total = DRUGS.length;
  var approved = DRUGS.filter(function(d){ return state.statuses[d.key]==="approved"; }).length;
  var pct = Math.round((approved/total)*100);
  document.getElementById("prog-bar").style.width = pct+"%";
  document.getElementById("prog-count").textContent = approved+"/"+total;
  var lp = document.getElementById("log-panel");
  if(lp) lp.innerHTML = renderLog(key);
}

function updateBadge(key){
  var s = state.statuses[key];
  var el = document.getElementById("tb-status");
  var labels = {pending:"Pending review",approved:"Approved",flagged:"Flagged"};
  el.textContent = labels[s];
  el.className = "sbadge badge-"+s;
}

function addLog(key,action,note){
  var time = new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  state.logs[key].unshift({time:time,action:action,note:note});
}

buildSidebar();
</script>
